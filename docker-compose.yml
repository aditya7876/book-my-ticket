services:
  postgres:
    image: postgres:16
    container_name: book-my-ticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_class_2_db
    ports:
      - "5433:5432"
    volumes:
      - book_my_ticket_pgdata:/var/lib/postgresql/data

volumes:
  book_my_ticket_pgdata:
